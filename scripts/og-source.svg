    <rect x="28" y="246" width="4" height="10" rx="0.75" fill="#334155" fill-opacity="0.8"/>
    <rect x="33" y="250" width="4" height="6" rx="0.75" fill="#F59E0B"/>
    <rect x="38" y="248" width="4" height="8" rx="0.75" fill="#334155" fill-opacity="0.6"/>
    <rect x="43" y="244" width="4" height="12" rx="0.75" fill="#334155" fill-opacity="0.9"/>
