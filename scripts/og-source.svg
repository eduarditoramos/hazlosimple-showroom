    <text x="190" y="97" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="900" fill="#102033" text-anchor="middle">24</text>
    <text x="190" y="110" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085" text-anchor="middle">Leads</text>

    <rect x="224" y="78" width="56" height="42" rx="6" fill="#F3F5EE"/>
    <text x="252" y="97" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="900" fill="#102033" text-anchor="middle">21%</text>
    <text x="252" y="110" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085" text-anchor="middle">Conversión</text>

    <rect x="286" y="78" width="56" height="42" rx="6" fill="#F3F5EE"/>
    <text x="314" y="97" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="900" fill="#102033" text-anchor="middle">$87k</text>
    <text x="314" y="110" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085" text-anchor="middle">Pipeline</text>

    <!-- Progress bars -->
