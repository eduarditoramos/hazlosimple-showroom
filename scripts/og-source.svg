    <rect x="162" y="144" width="180" height="5" rx="2.5" fill="#E5E8DF"/>
    <rect x="162" y="144" width="180" height="5" rx="2.5" fill="#2563EB"/>

    <text x="162" y="158" font-family="'Courier New',Courier,monospace" font-size="8" fill="#667085">Contactados</text>
    <rect x="162" y="162" width="135" height="5" rx="2.5" fill="#E5E8DF"/>
    <rect x="162" y="162" width="135" height="5" rx="2.5" fill="#2563EB" fill-opacity="0.7"/>

    <text x="162" y="176" font-family="'Courier New',Courier,monospace" font-size="8" fill="#667085">Cotizados</text>
    <rect x="162" y="180" width="75" height="5" rx="2.5" fill="#E5E8DF"/>
    <rect x="162" y="180" width="75" height="5" rx="2.5" fill="#2563EB" fill-opacity="0.5"/>

