    <rect x="366" y="68" width="100" height="130" rx="10" fill="white" stroke="#E0E4DA" stroke-width="1"/>
    <rect x="374" y="76" width="80" height="16" rx="4" fill="#DBEAFE"/>
    <text x="414" y="88" font-family="'Courier New',Courier,monospace" font-size="7" fill="#2563EB" text-anchor="middle" font-weight="600">LEAD CALIENTE</text>
    <text x="414" y="106" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="700" fill="#102033" text-anchor="middle">Mariana López</text>
    <text x="414" y="118" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085" text-anchor="middle">$18,500</text>
    <rect x="374" y="126" width="80" height="4" rx="2" fill="#E5E8DF"/>
    <rect x="374" y="126" width="58" height="4" rx="2" fill="#F59E0B"/>
    <text x="414" y="143" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085" text-anchor="middle">72% cierre</text>
    <!-- Action button -->
    <rect x="374" y="152" width="80" height="22" rx="6" fill="#2563EB"/>
    <text x="414" y="167" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="700" fill="white" text-anchor="middle">↗ Seguimiento</text>

    <!-- Bottom row: 4 mini app status cards -->
    <rect x="154" y="320" width="104" height="60" rx="8" fill="white" stroke="#E0E4DA" stroke-width="1"/>
    <rect x="162" y="328" width="12" height="12" rx="3" fill="#2563EB"/>
    <text x="180" y="337" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="600" fill="#102033">CRM</text>
    <text x="162" y="352" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="900" fill="#102033">24</text>
    <text x="162" y="368" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085">leads activos</text>

    <rect x="264" y="320" width="104" height="60" rx="8" fill="white" stroke="#E0E4DA" stroke-width="1"/>
    <rect x="272" y="328" width="12" height="12" rx="3" fill="#B91C1C"/>
    <text x="290" y="337" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="600" fill="#102033">Cocina</text>
    <text x="272" y="352" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="900" fill="#102033">18</text>
    <text x="272" y="368" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085">pedidos hoy</text>

    <rect x="154" y="390" width="104" height="60" rx="8" fill="white" stroke="#E0E4DA" stroke-width="1"/>
    <rect x="162" y="398" width="12" height="12" rx="3" fill="#0F766E"/>
    <text x="180" y="407" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="600" fill="#102033">Clínica</text>
    <text x="162" y="422" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="900" fill="#102033">14</text>
    <text x="162" y="438" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085">citas hoy</text>

    <rect x="264" y="390" width="104" height="60" rx="8" fill="white" stroke="#E0E4DA" stroke-width="1"/>
    <rect x="272" y="398" width="12" height="12" rx="3" fill="#334155"/>
    <text x="290" y="407" font-family="Arial,Helvetica,sans-serif" font-size="8" font-weight="600" fill="#102033">Operación</text>
    <text x="272" y="422" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="900" fill="#F59E0B">4</text>
    <text x="272" y="438" font-family="'Courier New',Courier,monospace" font-size="7" fill="#667085">stock bajo</text>
  </g>
</svg>
