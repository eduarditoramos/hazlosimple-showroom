<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Navy gradient background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d3560"/>
      <stop offset="100%" stop-color="#061f38"/>
    </linearGradient>
    <!-- Subtle dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.06)"/>
    </pattern>
    <!-- Window chrome gradient -->
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#E7E8E1"/>
      <stop offset="100%" stop-color="#DDDFD8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left green accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#16A34A"/>

  <!-- ── LEFT TEXT BLOCK ── -->

  <!-- System pill -->
  <rect x="72" y="80" width="220" height="32" rx="16" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <circle cx="96" cy="96" r="5" fill="#16A34A"/>
  <text x="110" y="101" font-family="'Courier New',Courier,monospace" font-size="12" font-weight="600" letter-spacing="0.16em" fill="rgba(255,255,255,0.6)" text-anchor="start">HAZLOSIMPLE OS</text>

  <!-- Main headline -->
  <text x="72" y="182" font-family="Arial,Helvetica,sans-serif" font-size="72" font-weight="900" fill="white" letter-spacing="-2">HazloSimple OS</text>

  <!-- Green accent word -->
  <text x="72" y="264" font-family="Arial,Helvetica,sans-serif" font-size="48" font-weight="800" fill="#4ADE80" letter-spacing="-1">Apps web para negocios</text>
  <text x="72" y="320" font-family="Arial,Helvetica,sans-serif" font-size="48" font-weight="800" fill="white" letter-spacing="-1">reales.</text>

  <!-- Subtext -->
  <text x="72" y="384" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.62)">CRM · Cocina / POS · Clínica · Control Operativo</text>

  <!-- CTA pill -->
  <rect x="72" y="428" width="264" height="52" rx="14" fill="#16A34A"/>
  <text x="204" y="460" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">Probar demos gratis →</text>

  <!-- Domain label -->
  <text x="72" y="558" font-family="'Courier New',Courier,monospace" font-size="14" fill="rgba(255,255,255,0.32)" letter-spacing="0.08em">hazlosimple-showroom.vercel.app</text>

  <!-- ── RIGHT — MINI APP WINDOW MOCKUP ── -->
  <g transform="translate(660, 60)">
    <!-- Window card shadow -->
    <rect x="4" y="8" width="490" height="500" rx="20" fill="rgba(0,0,0,0.3)"/>
    <!-- Window card -->
    <rect width="490" height="500" rx="20" fill="#FFFDF7" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

    <!-- Window chrome -->
    <rect width="490" height="44" rx="20" fill="url(#chrome)"/>
    <rect y="22" width="490" height="22" fill="url(#chrome)"/>
    <rect y="42" width="490" height="2" fill="#CCD1C5"/>
    <!-- Traffic lights -->
    <circle cx="22" cy="22" r="6" fill="#FF5F57"/>
    <circle cx="40" cy="22" r="6" fill="#FEBC2E"/>
    <circle cx="58" cy="22" r="6" fill="#28C840"/>
    <!-- Title -->
    <text x="245" y="27" font-family="'Courier New',Courier,monospace" font-size="11" font-weight="500" fill="#98A2B3" text-anchor="middle" letter-spacing="0.04em">HazloSimple OS · Command Center</text>

    <!-- App window body -->
    <rect x="12" y="56" width="466" height="432" rx="12" fill="#F6F7F1"/>

    <!-- Left navy sidebar -->
    <rect x="12" y="56" width="130" height="432" rx="12" fill="#082B4C"/>
    <rect x="116" y="56" width="26" height="432" fill="#082B4C"/>

    <!-- Sidebar items -->
    <!-- CRM active -->
    <rect x="12" y="72" width="130" height="48" fill="rgba(255,255,255,0.08)"/>
    <rect x="12" y="72" width="3" height="48" fill="#16A34A"/>
    <rect x="26" y="83" width="24" height="24" rx="6" fill="#2563EB"/>
    <rect x="31" y="89" width="5" height="12" rx="1" fill="rgba(255,255,255,0.4)"/>
    <rect x="38" y="89" width="5" height="12" rx="1" fill="rgba(255,255,255,0.6)"/>
    <rect x="45" y="89" width="5" height="12" rx="1" fill="rgba(255,255,255,0.8)"/>
    <rect x="52" y="89" width="5" height="12" rx="1" fill="white"/>
    <text x="64" y="93" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="white">CRM Simple</text>
    <text x="64" y="107" font-family="'Courier New',Courier,monospace" font-size="8" fill="rgba(255,255,255,0.4)">Ventas y seguimiento</text>

    <!-- Cocina -->
    <rect x="26" y="135" width="24" height="24" rx="6" fill="rgba(255,255,255,0.06)"/>
    <rect x="31" y="140" width="14" height="3" rx="1.5" fill="#B91C1C"/>
    <rect x="31" y="145" width="11" height="3" rx="1.5" fill="#B91C1C" fill-opacity="0.6"/>
    <rect x="31" y="150" width="8" height="3" rx="1.5" fill="#B91C1C" fill-opacity="0.4"/>
    <text x="64" y="145" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.78)">Cocina / POS</text>
    <text x="64" y="157" font-family="'Courier New',Courier,monospace" font-size="8" fill="rgba(255,255,255,0.38)">Pedidos y cocina</text>

    <!-- Clinica -->
    <rect x="26" y="185" width="24" height="24" rx="6" fill="rgba(255,255,255,0.06)"/>
    <rect x="35" y="188" width="6" height="18" rx="3" fill="#0F766E"/>
    <rect x="29" y="194" width="18" height="6" rx="3" fill="#0F766E"/>
    <text x="64" y="197" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="500" fill="rgba(255,255,255,0.78)">Clínica</text>
    <text x="64" y="209" font-family="'Courier New',Courier,monospace" font-size="8" fill="rgba(255,255,255,0.38)">Agenda y fichas</text>

    <!-- Operacion -->
