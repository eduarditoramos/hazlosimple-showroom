<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background — iOS clips to its own rounded square shape -->
  <rect width="180" height="180" rx="36" fill="#082B4C"/>
  <!-- Subtle gloss -->
  <rect x="0" y="0" width="180" height="90" rx="36" fill="rgba(255,255,255,0.05)"/>
  <!-- HS lettering -->
  <text
    x="90" y="101"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="79"
    letter-spacing="-2"
    fill="white"
  >HS</text>
  <!-- Green live dot -->
  <circle cx="143" cy="37" r="13" fill="#16A34A"/>
  <circle cx="143" cy="37" r="7" fill="#4ADE80"/>
</svg>
