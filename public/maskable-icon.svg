<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background — maskable icons get clipped by the OS to any shape -->
  <rect width="512" height="512" fill="#082B4C"/>
  <!-- Subtle gloss on top half -->
  <rect x="0" y="0" width="512" height="256" fill="rgba(255,255,255,0.04)"/>
  <!-- Content fits within 80% safe zone (51px padding each side → 410×410 area) -->
  <!-- HS lettering — smaller than regular icon to stay inside safe zone -->
  <text
    x="256" y="296"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="196"
    letter-spacing="-5"
    fill="white"
  >HS</text>
  <!-- Green dot inside safe zone — inset from edge -->
  <circle cx="374" cy="130" r="32" fill="#16A34A"/>
  <circle cx="374" cy="130" r="18" fill="#4ADE80"/>
</svg>
